name: CI

# Deterministic hard gate (build + offline fault-injection) on every push/PR,
# plus non-blocking visibility jobs (live smoke/edge, supply-chain audit).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    # REQUIRED gate: fully offline + deterministic (the fault harness mocks fetch
    # and neutralizes setTimeout backoff, so it never touches the network). This
    # is what makes "robustness" enforced rather than nominal.
    # Cross-OS: the maintainer + a large share of MCP-host users run Windows, where
    # path handling, CRLF line-endings, and the entry-point self-detection differ
    # from Linux. Running the deterministic gate on windows-latest too makes the
    # user's actual platform an ENFORCED target, not an assumption.
    name: gate — build + fault-injection (${{ matrix.os }} · Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Build (tsc; also catches src/dist drift)
        run: npm run build
      - name: tools/list snapshot parity (deterministic, offline — byte-identical gate)
        run: npm run test:snapshot
      - name: Fault-injection harness (offline, deterministic — 407+ assertions)
        run: node fault-injection-test.mjs

  lint:
    # REQUIRED: structural truthfulness invariant (no silent-empty-on-!ok).
    # Pure source scan — offline, deterministic, no build/install of the tree
    # needed beyond checkout + node.
    name: lint — truthfulness invariants (no silent-empty-on-error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Truthfulness invariant lint
        run: node lint-invariants.mjs

  coverage:
    # REQUIRED: c8 coverage of the deterministic fault suite against a floor
    # (.c8rc.json). Deterministic → no flakiness; a PR that adds code without
    # tests drops below the floor and fails, forcing coverage to not regress.
    name: coverage gate (c8 ≥ floor, deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Coverage floor (c8 --check-coverage via .c8rc.json)
        run: npm run coverage

  live-smoke:
    # NON-BLOCKING: hits live upstreams (SAM/USAspending/eCFR/…). USAspending in
    # particular flakes, so this reports signal without gating merges.
    name: live-smoke + edge (non-blocking — live upstreams)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Edge-case suite (live — flaky usas tolerated)
        run: node edge-case-test.mjs
        continue-on-error: true
      - name: Smoke suite (live — flaky usas tolerated)
        run: npm run smoke
        continue-on-error: true

  audit:
    # NON-BLOCKING supply-chain signal (T9 will harden into a gate).
    name: supply-chain audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      - name: npm audit (production deps)
        run: npm audit --omit=dev
        continue-on-error: true

  perf:
    # NON-BLOCKING: the 225 MB GSA-CSV backbone must stay bounded-RAM (streamed,
    # not load-all). RSS is environment-noisy, so this is a VISIBLE regression
    # signal, not a hard gate — a load-all regression grows RSS by ≥ the CSV file
    # size and trips it, while streaming grows by ~the compact index.
    name: perf — GSA-CSV bounded-RAM streaming (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: CSV backbone memory + scale (fixture)
        run: npm run perf
        continue-on-error: true
